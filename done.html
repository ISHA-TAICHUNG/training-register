<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>報名成功 — 115 高風險職訓</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="stripe"></div>
<header>
  <div class="header-content">
    <div class="brand-box">
      <div class="brand-logo"><span>ISHA</span></div>
      <div class="brand-text">
        臺中市政府勞工局
        <strong>勞 動 檢 查 處</strong>
      </div>
    </div>
    <div class="year-badge">115 年度</div>
  </div>
</header>

<main>
  <div class="card">
    <div class="success-hero">
      <div class="icon">✓</div>
      <h1>報名資料已送出</h1>
      <div class="sub">
        我們已收到您的報名資料與證明文件。<br>
        承辦單位將進行資格審核，審核結果將以電話或電子郵件通知。
      </div>
    </div>

    <div class="summary-box" id="summary"></div>

    <div class="notice notice-ok" style="margin-top:20px">
      <strong>溫馨提醒：</strong>
      <ul style="list-style:disc;padding-left:20px;margin-top:6px;font-size:12.5px;line-height:1.85">
        <li>請留意來電，承辦單位可能聯繫補件或通知錄取。</li>
        <li>如需查詢報名狀態，請聯絡承辦窗口。</li>
        <li>錄取後無故缺席者，下一年度訓練課程得不予錄取。</li>
      </ul>
    </div>
  </div>

  <div class="btn-bar" style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn" id="btn-lookup-status" style="flex:1;min-width:160px;background:#fff;color:#0057B8;border:2px solid #0057B8;padding:12px;border-radius:6px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer">📋 查詢報名狀態</button>
    <button class="btn btn-primary" onclick="location.href='index.html'" style="flex:1;min-width:160px">返回首頁</button>
  </div>
</main>

<!-- 主辦 / 承辦單位 -->
<section style="background:#fff;border-top:1px solid #e5e5e5;padding:24px 16px">
  <div style="max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:18px">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="assets/logo-host.png" alt="臺中市政府勞工局" style="width:64px;height:64px;flex-shrink:0;object-fit:contain">
      <div>
        <div style="font-size:11px;color:#666;font-weight:600;letter-spacing:1px;margin-bottom:2px">主辦單位</div>
        <div style="font-size:14px;color:#0057B8;font-weight:700;line-height:1.4">臺中市勞動檢查處</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <img src="assets/logo-isha.png" alt="社團法人中華民國工業安全衛生協會" style="width:64px;height:64px;flex-shrink:0;object-fit:contain">
      <div>
        <div style="font-size:11px;color:#666;font-weight:600;letter-spacing:1px;margin-bottom:2px">承辦單位</div>
        <div style="font-size:14px;color:#0057B8;font-weight:700;line-height:1.4">社團法人中華民國工業安全衛生協會<br>附設臺中職業訓練中心</div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="ft-title">臺中市政府勞工局　勞動檢查處</div>
  <div class="ft-sub">OCCUPATIONAL SAFETY &amp; HEALTH · TAICHUNG</div>
</footer>

<script src="js/config.js"></script>
<script src="js/lookup-modal.js"></script>
<script>
  // 把 last_submission 存的姓名 + 身分證後 5 碼留下來給查詢用（在 sessionStorage.clear 之前抓）
  let lookupPrefill = null;
  (function () {
    const raw = sessionStorage.getItem("last_submission");
    const box = document.getElementById("summary");
    if (!raw) {
      box.textContent = "（無最近報名紀錄）";
    } else {
      const s = JSON.parse(raw);
      // 預填查詢資料：姓名 + 身分證後 5 碼（從 last_submission 取 — submit 時放進去的）
      if (s.name && s.idLast5) {
        lookupPrefill = { name: s.name, id5: s.idLast5 };
      }
      const rows = [
        ["報名編號", s.regId || "審核後發送"],
        ["課程名稱", s.course ? s.course.name + " " + s.course.session : ""],
        ["上課日期", s.course ? s.course.date : ""],
        ["上課地點", s.course ? s.course.location : ""],
        ["報名人姓名", s.name || ""],
      ];
      rows.forEach(([label, val]) => {
        const row = document.createElement("div");
        row.className = "row";
        const l = document.createElement("div");
        l.className = "label";
        l.textContent = label;
        const v = document.createElement("div");
        v.className = "val";
        v.textContent = val;
        row.append(l, v);
        box.append(row);
      });
    }
    // 進到完成頁面立即清掉所有 sessionStorage（公用電腦下個使用者看不到個資）
    try { sessionStorage.clear(); } catch (e) {}
  })();

  // 查詢報名狀態按鈕（自動帶入剛報名的資料）
  document.getElementById("btn-lookup-status").addEventListener("click", () => {
    window.LookupModal.open(lookupPrefill);
  });
</script>
</body>
</html>
